services:
  postgres:
    image: postgres:16-alpine
    container_name: insumia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-insumia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insumia}
      POSTGRES_DB: ${POSTGRES_DB:-insumia}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - insumia_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-insumia} -d ${POSTGRES_DB:-insumia}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  insumia_pg_data:
