# Blueprint Render — provisiona Postgres + API NestJS.
# Deploy: https://dashboard.render.com → New → Blueprint → aponte para este repo.
databases:
  - name: insumia-db
    databaseName: insumia
    user: insumia
    plan: free

services:
  - type: web
    name: insumia-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    healthCheckPath: /api/v1/health
    buildCommand: corepack enable && pnpm install --filter "@insumia/api..." --no-frozen-lockfile && pnpm --filter @insumia/api exec prisma generate
    startCommand: pnpm --filter @insumia/api exec prisma migrate deploy && pnpm --filter @insumia/api start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: insumia-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_VERSION
        value: "20.18.0"
