server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA — todas as rotas caem no index.html (React Router)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # index.html NUNCA pode ser cacheado, senao bundle novo nao carrega
  location = /index.html {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    add_header Pragma "no-cache";
  }

  # Cache agressivo so dos assets com hash (eles tem nome unico por build)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
